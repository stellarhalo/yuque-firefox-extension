name: CI

on:
  workflow_dispatch:

  push:
    branches:
      - 'master'
      - 'main'
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'

# Cancel last CI if new commit come
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  Runner:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Git Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Lint (lint:check)
        run: npm run lint
        continue-on-error: false

      - name: Type check (advisory)
        run: npm run type:check || echo "Type check warnings (non-blocking, webpack uses transpileOnly)"
        continue-on-error: true

      - name: Build Firefox Release
        run: npm run bundle:firefox

      - name: Build Firefox Beta
        run: npm run bundle:firefox:beta

      - name: Package
        run: npm run pack-zip

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/yuque-firefox-extension-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

